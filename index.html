<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" type="text/css" />
    <title>DD Burguer</title>
  </head>
  <body>
    <header>
      <div class="container">
        <div class="logo">
          <a href="">DD <span>●</span> Burguer</a>
        </div>
        <nav>
          <ul class="leftside">
            <!--Lista de navegação à esquerda-->
            <li><a href="">Início</a></li>
            <li><a href="">Cardápio</a></li>
            <li><a href="">Contato</a></li>
          </ul>
          <div class="rightside">
            <!-- Conteúdo da direita -->
            <a href="" class="button">Fazer Pedido</a>
          </div>
        </nav>
        <div class="menu">
          <div class="menu-item">
            <div></div>
            <div></div>
            <div></div>
          </div>
          <!--Conteúdo do menu-->
        </div>
      </div>
    </header>
    <section class="hero">
      <div class="container">
        <!--Lado Esquerdo-->
        <div class="leftside">
          <h1>O Hamburguer mais delicioso de Anápolis.</h1>
          <p>Sofisticação em cada detalhe, sabor em cada mordida.</p>
          <a href="#" class="button">Fazer Pedido</a>
        </div>
        <!--Lado Direito -->
        <div class="rightside">
          <img src="assets/heroburguer.png" alt="Imagem de hamburguer" />
        </div>
      </div>
    </section>
    <section class="search">
      <div class="container">
        <div class="title">Pesquise o seu <br />Hamburguer favorito!</div>
        <div class="sides">
          <div class="leftside">
            <input type="search" placeholder="Digite o nome do Burguer" />
          </div>
          <div class="rightside">
            <select name="" id="">
              <option value="">Selecionar categoria</option>
              <option value="burgers">Burgers</option>
              <option value="vegans">Burgers Vegans</option>
              <option value="kids">Kids</option>
            </select>
          </div>
        </div>
      </div>
    </section>

    <!-- <footer>
      <div class="logo">
        <a href="">DD <span>●</span> Burguer</a>
      </div>
    </footer>
     -->
  </body>
</html>
